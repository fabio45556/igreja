                    <th>Data</th>

// ... (resto do seu script)

    <script>
        // Faz a chamada para a sua API Java
        fetch('/api/escala')
            .then(response => response.json())
            .then(dados => {
                const corpoTabela = document.querySelector('#tabela-escala tbody');
                dados.forEach(item => {
                    const linha = `<tr>
                        <td>${item.data}</td>
                        <td>${item.setor}</td>
                        <td>${item.responsavel}</td>
                    </tr>`;
                    corpoTabela.innerHTML += linha;
                });
            });
    </script>
</body>
</div>
</html>
