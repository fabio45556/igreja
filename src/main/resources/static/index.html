<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escala da Igreja</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; padding: 20px; }
        table { border-collapse: collapse; width: 100%; max-width: 600px; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        th { background-color: #007bff; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #ddd; }
        tr:hover { background-color: #f1f1f1; }
        h2 { color: #333; text-align: center; }
    </style>
</head>
<body>
    <div class="container mt-5">
        <h2 class="text-center mb-4">Escala Mensal - Igreja</h2>
        
        <table id="tabela-escala" class="table table-striped table-hover table-bordered text-center shadow-sm">
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Setor</th>
                    <th>Responsável</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>

    <script>
        fetch('/api/escala')
            .then(response => response.json())
            .then(dados => {
                const corpoTabela = document.querySelector('#tabela-escala tbody');
                
                // Limpa a tabela antes de preencher
                corpoTabela.innerHTML = ''; 
                
                dados.forEach(item => {
                    const linha = `<tr>
                        <td>${item.data}</td>
                        <td>${item.setor}</td>
                        <td>${item.responsavel}</td>
                    </tr>`;
                    corpoTabela.innerHTML += linha;
                });
            })
            .catch(erro => {
                console.error("Houve um problema ao buscar a escala:", erro);
            });
    </script>
</body>
</html>
